# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

builds:
  - id: skills
    main: .
    binary: skills
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ignore:
      - goos: darwin
        goarch: amd64
    ldflags:
      - -s -w -X main.version={{ .Version }}
    env:
      - CGO_ENABLED=0

archives:
  - id: skills-archive
    builds: [skills]
    name_template: "skills-{{ .Os }}-{{ .Arch }}"
    format: binary


nfpms:
  - id: skills-tui-packages
    package_name: skills-tui
    vendor: Kevin P. Inscoe
    homepage: https://github.com/kevinpinscoe/skills-tui
    maintainer: Kevin P. Inscoe <kevin.inscoe@gmail.com>
    description: Interactive TUI skill chooser
    license: MIT
    formats: [deb, rpm]
    bindir: /usr/bin
    builds: [skills]

brews:
  - name: skills-tui
    repository:
      owner: kevinpinscoe
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: https://github.com/kevinpinscoe/skills-tui
    description: Interactive TUI skill chooser
    license: MIT
    test: |
      system "#{bin}/skills", "--help"

checksum:
  name_template: "checksums.txt"

signs:
  - cmd: cosign
    signature: "${artifact}.sigstore.json"
    args:
      - sign-blob
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum

release:
  github:
    owner: kevinpinscoe
    name: skills-tui
  name_template: "v{{ .Version }}"
  make_latest: true
