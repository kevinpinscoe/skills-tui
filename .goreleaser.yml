# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

builds:
  - id: skill
    main: .
    binary: skill
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ignore:
      - goos: darwin
        goarch: amd64
    ldflags:
      - -s -w -X main.version={{ .Version }}
    env:
      - CGO_ENABLED=0

archives:
  - id: skill-archive
    builds: [skill]
    name_template: "skill-{{ .Os }}-{{ .Arch }}"
    format: binary


nfpms:
  - id: skills-tui-packages
    package_name: skills-tui
    vendor: Kevin P. Inscoe
    homepage: https://github.com/kevinpinscoe/skills-tui
    maintainer: Kevin P. Inscoe <kevin.inscoe@gmail.com>
    description: Interactive TUI skill chooser
    license: MIT
    formats: [deb, rpm]
    bindir: /usr/bin
    builds: [skill]

brews:
  - name: skills-tui
    repository:
      owner: kevinpinscoe
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: https://github.com/kevinpinscoe/skills-tui
    description: Interactive TUI skill chooser
    license: MIT
    test: |
      system "#{bin}/skill", "--help"

checksum:
  name_template: "checksums.txt"

signs:
  - cmd: cosign
    args:
      - sign-blob
      - --yes
      - --output-signature=${signature}
      - --output-certificate=${certificate}
      - ${artifact}
    artifacts: checksum
    certificate: ${artifact}.pem
    signature: ${artifact}.sig
    output: true

release:
  github:
    owner: kevinpinscoe
    name: skills-tui
  name_template: "v{{ .Version }}"
  make_latest: true
