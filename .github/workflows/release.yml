name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  build:
    name: Build and Release
    runs-on: macos-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: |
          mkdir -p dist
          LDFLAGS="-s -w -X main.version=${GITHUB_REF_NAME}"
          GOOS=linux  GOARCH=amd64  go build -ldflags="$LDFLAGS" -o dist/skill-linux-amd64   .
          GOOS=darwin GOARCH=arm64  go build -ldflags="$LDFLAGS" -o dist/skill-darwin-arm64  .
          GOOS=linux  GOARCH=arm64  go build -ldflags="$LDFLAGS" -o dist/skill-linux-arm64   .

      - name: Sign macOS binary
        run: codesign --sign - dist/skill-darwin-arm64

      - name: Generate checksums and commit reference
        run: |
          cd dist
          shasum -a 256 skill-linux-amd64 skill-darwin-arm64 skill-linux-arm64 > checksums.txt
          echo "${{ github.sha }}" > commit.txt

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign release checksums
        run: |
          cosign sign-blob --yes \
            --output-signature dist/checksums.txt.sig \
            --output-certificate dist/checksums.txt.pem \
            dist/checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          make_latest: true
          generate_release_notes: true
          files: |
            dist/skill-linux-amd64
            dist/skill-darwin-arm64
            dist/skill-linux-arm64
            dist/checksums.txt
            dist/checksums.txt.sig
            dist/checksums.txt.pem
            dist/commit.txt
